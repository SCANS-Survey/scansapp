name: scansapp
description: "SCANS Observer App"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.5

dependencies:
  camera: ^0.12.0+1
  flutter:
    sdk: flutter
  hashlib: ^2.3.4
  mqtt_client: ^10.11.11
  udp: ^5.0.3
  shared_preferences: ^2.2.0
  wakelock_plus: ^1.6.1
  image: ^4.0.17
  record: ^6.2.1
  geolocator: ^13.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

flutter_icons:
  android: true
  ios: false
  image_path: "../icon/SCANSAppBaseIcon.bmp"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "../icon/SCANSAppBaseIcon.bmp"
